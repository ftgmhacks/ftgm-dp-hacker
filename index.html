<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM DP HACKER</title>

    <!-- Google Fonts for Modern Developer Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">

    <style>
        /* Modern Developer Theme Variables */
        :root {
            --bg-base: #09090b;
            --bg-card: rgba(24, 24, 27, 0.7);
            --bg-input: #18181b;
            --border-subtle: #27272a;
            --border-focus: #3b82f6;
            --accent-primary: #3b82f6;
            --accent-hover: #2563eb;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --warning-bg: rgba(234, 179, 8, 0.1);
            --warning-text: #fde047;
            --warning-border: rgba(234, 179, 8, 0.2);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-text: #fca5a5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Ambient Glow */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 30px;
        }

        .title {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 2rem;
            background: linear-gradient(to right, #fff, #71717a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        input[type="number"] {
            flex: 1;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-input);
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input[type="number"]:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn {
            background-color: var(--accent-primary);
            color: #ffffff;
            border: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }

        .warning-box {
            background: var(--warning-bg);
            border: 1px solid var(--warning-border);
            color: var(--warning-text);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: left;
            margin-bottom: 24px;
            animation: fadeIn 0.4s ease;
        }

        .warning-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
        }

        .display-area {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, var(--border-subtle), #18181b);
            transition: all 0.4s ease;
        }

        .display-area.active {
            background: linear-gradient(135deg, var(--accent-primary), #10b981);
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.2);
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: var(--bg-base);
            display: block;
            border: 4px solid var(--bg-card);
        }

        /* Pulsing Loader Animation */
        .loader-ring {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 2px dashed var(--accent-primary);
            animation: spin 3s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .actions-box {
            margin-top: 24px;
            animation: fadeIn 0.4s ease;
        }

        .download-btn {
            width: 100%;
            background-color: var(--text-primary);
            color: var(--bg-base);
        }

        .download-btn:hover:not(:disabled) {
            background-color: #d4d4d8;
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15);
        }

        .message-text {
            font-size: 0.85rem;
            margin-top: 16px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .message-text.error {
            display: block;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .hidden {
            display: none !important;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container { padding: 24px; border: none; border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center;}
            .input-group { flex-direction: column; }
            body::before { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="title">FTGM DP HACKER</h1>
            <p class="subtitle">Extract Target Profile Picture Instantly</p>
        </div>

        <div class="input-group">
            <input type="number" id="numberInput" placeholder="Enter Num: 923104882921" autocomplete="off" />
            <button class="btn" id="fetchBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12h4l3-9 5 18 3-9h5"/></svg>
                Process
            </button>
        </div>

        <!-- Warning Dialogue -->
        <div class="warning-box">
            <svg class="warning-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <span>Works only on Business Profiles set to Everyone or Public.</span>
        </div>

        <div class="display-area" id="avatarContainer">
            <div id="loader" class="loader-ring hidden"></div>
            <!-- Default Placeholder Image -->
            <img id="avatarImg" class="circle" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2327272a'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E" alt="Target DP" />
        </div>

        <div id="messageBox" class="message-text"></div>

        <div id="actionBox" class="actions-box hidden">
            <button class="btn download-btn" id="downloadBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download Image
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fetchBtn = document.getElementById('fetchBtn');
            const numberInput = document.getElementById('numberInput');
            const loader = document.getElementById('loader');
            const avatarImg = document.getElementById('avatarImg');
            const avatarContainer = document.getElementById('avatarContainer');
            const actionBox = document.getElementById('actionBox');
            const downloadBtn = document.getElementById('downloadBtn');
            const messageBox = document.getElementById('messageBox');

            const defaultPlaceholder = avatarImg.src;
            let currentApiUrl = "";

            fetchBtn.addEventListener('click', () => {
                const targetNum = numberInput.value.trim();

                if (!targetNum) {
                    showMessage("Please enter a valid number first.", "error");
                    return;
                }

                currentApiUrl = `https://ftgm-dp-hacker.vercel.app/api?num=${targetNum}`;

                // Reset UI for new process
                avatarImg.src = defaultPlaceholder;
                avatarImg.style.opacity = '0.5';
                loader.classList.remove('hidden');
                actionBox.classList.add('hidden');
                avatarContainer.classList.remove('active');
                messageBox.classList.remove('error');
                
                fetchBtn.disabled = true;

                // Load Image
                const tempImg = new Image();
                tempImg.src = currentApiUrl;

                tempImg.onload = () => {
                    avatarImg.src = currentApiUrl;
                    avatarImg.style.opacity = '1';
                    loader.classList.add('hidden');
                    avatarContainer.classList.add('active');
                    actionBox.classList.remove('hidden');
                    fetchBtn.disabled = false;
                };

                tempImg.onerror = () => {
                    avatarImg.src = defaultPlaceholder;
                    avatarImg.style.opacity = '1';
                    loader.classList.add('hidden');
                    fetchBtn.disabled = false;
                    showMessage("Failed to extract DP. Make sure the number is correct and the profile is Business/Public.", "error");
                };
            });

            downloadBtn.addEventListener('click', async () => {
                const targetNum = numberInput.value.trim() || 'target';
                const originalBtnText = downloadBtn.innerHTML;
                
                try {
                    downloadBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Downloading...`;
                    downloadBtn.disabled = true;

                    // Robust auto-downloading using reliable CORS proxy
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(currentApiUrl)}`;
                    let response = await fetch(proxyUrl);
                    
                    if (!response.ok) {
                        // Fallback proxy just in case
                        response = await fetch(`https://corsproxy.io/?${encodeURIComponent(currentApiUrl)}`);
                    }

                    if (!response.ok) throw new Error("Proxies failed");

                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);

                    // Create hidden link and click it to trigger automatic browser download
                    const tempAnchor = document.createElement('a');
                    tempAnchor.style.display = 'none';
                    tempAnchor.href = blobUrl;
                    tempAnchor.download = `FTGM-DP-${targetNum}.png`;
                    
                    document.body.appendChild(tempAnchor);
                    tempAnchor.click();
                    document.body.removeChild(tempAnchor);
                    
                    // Cleanup memory
                    setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);

                } catch (error) {
                    console.error("Auto-Download blocked by browser or failed:", error);
                    // Fallback: Opens the image link natively so the user can save it
                    window.open(currentApiUrl, '_blank');
                } finally {
                    // Reset Button State
                    setTimeout(() => {
                        downloadBtn.innerHTML = originalBtnText;
                        downloadBtn.disabled = false;
                    }, 1000);
                }
            });

            function showMessage(msg, type) {
                messageBox.textContent = msg;
                messageBox.className = `message-text ${type}`;
            }
            
            // Trigger Process on Enter Key
            numberInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') {
                    fetchBtn.click();
                }
            });
        });
    </script>
</body>
</html>
