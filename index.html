<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM DP HACKER</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #050505;
            --accent-cyan: #00f3ff;
            --accent-blue: #5C86FF;
            --accent-green: #3ddc84;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #c9d1d9;
            --error-red: #f85149;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
        }
        .orb-1 { top: 10%; left: 10%; background: var(--accent-cyan); }
        .orb-2 { bottom: 10%; right: 10%; background: var(--accent-blue); }

        .container {
            width: 90%;
            max-width: 500px;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Title Styling */
        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px; border-radius: 100px;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; color: #888; margin-bottom: 15px;
        }
        .dot { width: 6px; height: 6px; background: var(--accent-cyan); border-radius: 50%; animation: pulse 1.5s infinite; }

        .subtitle { 
            font-size: 11px; 
            color: var(--accent-cyan); 
            letter-spacing: 0.3em; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            opacity: 0.8; 
        }

        /* Input Styling */
        .input-group {
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border-glass);
            border-radius: 20px; 
            display: flex; 
            align-items: center;
            padding: 5px 5px 5px 20px; 
            margin-bottom: 25px;
            transition: 0.3s;
        }
        .input-group:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        input[type="number"] {
            background: transparent; 
            border: none; 
            outline: none;
            color: white; 
            font-size: 18px; 
            font-family: 'JetBrains Mono', monospace; 
            width: 100%;
            padding: 10px;
        }
        /* Remove arrows from number input */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        .btn {
            background: var(--accent-cyan);
            color: black;
            border: none;
            padding: 14px 28px;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 243, 255, 0.3);
        }

        /* Display Area & Shimmer Animation */
        .display-area {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px auto;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-glass);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: block;
        }

        .shimmer {
            background: #111;
            background-image: linear-gradient(to right, #111 0%, #222 20%, #111 40%, #111 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%;
            animation: placeholderShimmer 1.5s infinite linear forwards;
        }

        @keyframes placeholderShimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        /* Action Box & Links */
        .actions-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px;
            animation: slideUp 0.4s ease;
        }

        .endpoint-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent-cyan);
            word-break: break-all;
            margin-bottom: 15px;
            background: rgba(0, 243, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
        }

        .download-btn {
            width: 100%;
            background: linear-gradient(to right, var(--accent-blue), #4a6cf7);
            color: white;
        }

        .error-text {
            color: var(--error-red);
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 600;
        }

        .hidden { display: none !important; }

        @keyframes pulse { 50% { opacity: 0.3; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; width: 85%; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <div class="status-badge"><div class="dot"></div> System Active</div>
        <h1>FTGM DP HACKER</h1>
        <p class="subtitle">Profile Picture Extractor</p>

        <div class="input-group">
            <input type="number" id="numberInput" placeholder="Enter Num: 923104882921" />
            <button class="btn" id="fetchBtn">Process</button>
        </div>

        <div class="display-area">
            <div id="loader" class="circle shimmer hidden"></div>
            <img id="avatarImg" class="circle hidden" alt="Target DP" />
        </div>

        <div id="errorMsg" class="error-text hidden"></div>

        <div id="actionBox" class="actions-box hidden">
            <div id="endpointText" class="endpoint-url"></div>
            <button class="btn download-btn" id="downloadBtn">Download Image</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fetchBtn = document.getElementById('fetchBtn');
            const numberInput = document.getElementById('numberInput');
            const loader = document.getElementById('loader');
            const avatarImg = document.getElementById('avatarImg');
            const actionBox = document.getElementById('actionBox');
            const endpointText = document.getElementById('endpointText');
            const downloadBtn = document.getElementById('downloadBtn');
            const errorMsg = document.getElementById('errorMsg');

            let currentApiUrl = "";

            fetchBtn.addEventListener('click', () => {
                const targetNum = numberInput.value.trim();

                if (!targetNum) {
                    showError("Please enter a valid number first.");
                    return;
                }

                currentApiUrl = `https://ftgm-dp-hacker.vercel.app/api?num=${targetNum}`;

                loader.classList.remove('hidden');
                avatarImg.classList.add('hidden');
                actionBox.classList.add('hidden');
                errorMsg.classList.add('hidden');

                avatarImg.src = currentApiUrl;

                avatarImg.onload = () => {
                    loader.classList.add('hidden');
                    avatarImg.classList.remove('hidden');
                    endpointText.textContent = `API: ${currentApiUrl}`;
                    actionBox.classList.remove('hidden');
                };

                avatarImg.onerror = () => {
                    loader.classList.add('hidden');
                    showError("Failed to load DP. The API is offline or the number is invalid.");
                };
            });

            downloadBtn.addEventListener('click', async () => {
                const targetNum = numberInput.value.trim() || 'unknown';
                
                try {
                    downloadBtn.innerText = "Processing...";
                    downloadBtn.disabled = true;

                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(currentApiUrl)}`;
                    const response = await fetch(proxyUrl);
                    
                    if (!response.ok) throw new Error("Proxy failed");

                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);

                    const tempAnchor = document.createElement('a');
                    tempAnchor.href = blobUrl;
                    tempAnchor.download = `FTGM-DP-${targetNum}.png`;
                    document.body.appendChild(tempAnchor);
                    tempAnchor.click();
                    document.body.removeChild(tempAnchor);
                    
                    URL.revokeObjectURL(blobUrl);

                } catch (error) {
                    window.open(currentApiUrl, '_blank');
                } finally {
                    downloadBtn.innerText = "Download Image";
                    downloadBtn.disabled = false;
                }
            });

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
