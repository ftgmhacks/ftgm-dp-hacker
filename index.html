<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM DP HACKER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --accent-cyan: #00f3ff;
            --accent-blue: #5C86FF;
            --accent-green: #3ddc84;
            --glass: rgba(255, 255, 255, 0.03);
            --border-glass: rgba(255, 255, 255, 0.1);
            
            /* Typewriter Vars */
            --blue: #5C86FF;
            --blue-dark: #275EFE;
            --key: #fff;
            --paper: #EEF0FD;
            --text: #D3D4EC;
            --tool: #FBC56C;
            --duration: 3s;
        }

        body {
            background-color: var(--bg-deep);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Background Orbs */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
        }
        .orb-1 { top: 10%; left: 10%; background: var(--accent-cyan); }
        .orb-2 { bottom: 10%; right: 10%; background: var(--accent-blue); }

        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 10, 12, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Typography */
        h1 {
            font-size: 2.6rem; 
            font-weight: 900; 
            margin: 0;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .status-badge {
            display: inline-flex;
            align-items: center; gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 16px; border-radius: 100px;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; color: #888; margin-bottom: 20px;
        }
        
        .dot { 
            width: 6px; height: 6px; 
            background: var(--accent-cyan); 
            border-radius: 50%; 
            animation: pulse 1.5s infinite; 
        }

        .subtitle { 
            font-size: 11px; 
            color: var(--accent-cyan); 
            letter-spacing: 0.5em; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            opacity: 0.8; 
            margin-top: 5px;
        }

        /* Inputs & Buttons */
        .input-group {
            background: rgba(255,255,255,0.02); 
            border: 1px solid var(--border-glass);
            border-radius: 20px; 
            display: flex; 
            align-items: center;
            padding: 5px 5px 5px 25px; 
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .input-group:focus-within {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .prefix { 
            font-family: 'JetBrains Mono', monospace; 
            font-weight: bold; 
            color: var(--accent-cyan); 
            font-size: 20px; 
            margin-right: 15px; 
        }

        input {
            background: transparent; border: none; outline: none;
            color: white; font-size: 22px; font-family: 'JetBrains Mono', monospace; width: 100%;
        }
        
        input::placeholder { color: rgba(255, 255, 255, 0.2); }

        .search-btn {
            width: 100%; padding: 18px; 
            background: var(--accent-cyan);
            border: none; border-radius: 18px; 
            font-weight: 800; font-size: 14px;
            cursor: pointer; transition: 0.3s; color: black;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .search-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.4);
        }
        
        .search-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Custom Alert System */
        #customAlert {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .alert-box {
            background: #111; border: 1px solid var(--accent-cyan);
            padding: 30px; border-radius: 24px; text-align: center;
            max-width: 400px; width: 80%;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }
        .alert-box h3 { color: var(--accent-cyan); margin-top: 0; }
        .alert-box p { color: #ccc; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .alert-close {
            background: var(--accent-cyan); border: none; padding: 10px 30px;
            border-radius: 12px; font-weight: 800; cursor: pointer; color: black;
        }

        /* Typewriter Loader */
        #loader-container { display: none; flex-direction: column; align-items: center; margin: 40px 0; }
        .loading-text { font-size: 10px; font-family: 'JetBrains Mono'; color: var(--accent-cyan); margin-top: 15px; letter-spacing: 2px;}

        .typewriter { position: relative; animation: bounce05 var(--duration) linear infinite; }
        .typewriter .slide { width: 92px; height: 20px; border-radius: 3px; margin-left: 14px; transform: translateX(14px); background: linear-gradient(var(--blue), var(--blue-dark)); animation: slide05 var(--duration) ease infinite; }
        .typewriter .slide:before, .typewriter .slide:after, .typewriter .slide i:before { content: ""; position: absolute; background: var(--tool); }
        .typewriter .slide:before { width: 2px; height: 8px; top: 6px; left: 100%; }
        .typewriter .slide:after { left: 94px; top: 3px; height: 14px; width: 6px; border-radius: 3px; }
        .typewriter .slide i { display: block; position: absolute; right: 100%; width: 6px; height: 4px; top: 4px; background: var(--tool); }
        .typewriter .slide i:before { right: 100%; top: -2px; width: 4px; border-radius: 2px; height: 14px; }
        .typewriter .paper { position: absolute; left: 24px; top: -26px; width: 40px; height: 46px; border-radius: 5px; background: var(--paper); transform: translateY(46px); animation: paper05 var(--duration) linear infinite; }
        .typewriter .paper:before { content: ""; position: absolute; left: 6px; right: 6px; top: 7px; border-radius: 2px; height: 4px; transform: scaleY(0.8); background: var(--text); box-shadow: 0 12px 0 var(--text), 0 24px 0 var(--text), 0 36px 0 var(--text); }
        .typewriter .keyboard { width: 120px; height: 56px; margin-top: -10px; z-index: 1; position: relative; }
        .typewriter .keyboard:before { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 7px; background: linear-gradient(135deg, var(--blue), var(--blue-dark)); transform: perspective(10px) rotateX(2deg); transform-origin: 50% 100%; }
        .typewriter .keyboard:after { content: ""; position: absolute; left: 2px; top: 25px; width: 11px; height: 4px; border-radius: 2px; box-shadow: 15px 0 0 var(--key), 30px 0 0 var(--key), 45px 0 0 var(--key), 60px 0 0 var(--key), 75px 0 0 var(--key), 90px 0 0 var(--key), 22px 10px 0 var(--key), 37px 10px 0 var(--key), 52px 10px 0 var(--key), 60px 10px 0 var(--key), 68px 10px 0 var(--key), 83px 10px 0 var(--key); animation: keyboard05 var(--duration) linear infinite; }

        @keyframes bounce05 { 85%, 92%, 100% { transform: translateY(0); } 89% { transform: translateY(-4px); } 95% { transform: translateY(2px); } }
        @keyframes slide05 { 5% { transform: translateX(14px); } 15%, 30% { transform: translateX(6px); } 40%, 55% { transform: translateX(0); } 65%, 70% { transform: translateX(-4px); } 80%, 89% { transform: translateX(-12px); } 100% { transform: translateX(14px); } }
        @keyframes paper05 { 5% { transform: translateY(46px); } 20%, 30% { transform: translateY(34px); } 40%, 55% { transform: translateY(22px); } 65%, 70% { transform: translateY(10px); } 80%, 85% { transform: translateY(0); } 92%, 100% { transform: translateY(46px); } }
        @keyframes keyboard05 { 5%, 12%, 21%, 30%, 39%, 48%, 57%, 66%, 75%, 84% { box-shadow: 15px 0 0 var(--key), 30px 0 0 var(--key), 45px 0 0 var(--key), 60px 0 0 var(--key), 75px 0 0 var(--key), 90px 0 0 var(--key), 22px 10px 0 var(--key), 37px 10px 0 var(--key), 52px 10px 0 var(--key), 60px 10px 0 var(--key), 68px 10px 0 var(--key), 83px 10px 0 var(--key); } 9% { box-shadow: 15px 2px 0 var(--key), 30px 0 0 var(--key), 45px 0 0 var(--key), 60px 0 0 var(--key), 75px 0 0 var(--key), 90px 0 0 var(--key), 22px 10px 0 var(--key), 37px 10px 0 var(--key), 52px 10px 0 var(--key), 60px 10px 0 var(--key), 68px 10px 0 var(--key), 83px 10px 0 var(--key); } 18% { box-shadow: 15px 0 0 var(--key), 30px 0 0 var(--key), 45px 0 0 var(--key), 60px 2px 0 var(--key), 75px 0 0 var(--key), 90px 0 0 var(--key), 22px 10px 0 var(--key), 37px 10px 0 var(--key), 52px 10px 0 var(--key), 60px 10px 0 var(--key), 68px 10px 0 var(--key), 83px 10px 0 var(--key); } }
        
        @keyframes pulse { 50% { opacity: 0.3; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } }

        /* Output & Terminal Elements for DP Hacker Logic */
        .circle {
            width: 160px; height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            display: block;
            margin: 0 auto 25px auto;
            animation: slideUp 0.5s ease;
        }

        .terminal {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            text-align: left;
            word-break: break-all;
            max-height: 120px;
            overflow-y: auto;
            animation: slideUp 0.6s ease;
        }
        
        .log-success { color: var(--accent-green); }
        .log-error { color: #ff4444; }
        .log-info { color: var(--accent-cyan); }

        .btn-download {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--accent-cyan);
        }
        .btn-download:hover:not(:disabled) {
            background: rgba(0, 243, 255, 0.1);
        }

        /* Footer Links */
        .footer-actions {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .join-btn { 
            background: #25D366; color: white; text-decoration: none; 
            padding: 15px; border-radius: 18px; font-weight: 800; font-size: 13px; 
            display: block; transition: 0.3s; text-transform: uppercase;
        }
        .join-btn:hover { background: #20b858; transform: translateY(-2px); }

        .tools-btn {
            background: transparent; color: #888; text-decoration: none;
            padding: 12px; border-radius: 18px; font-weight: 700; font-size: 12px;
            border: 1px solid var(--border-glass); transition: 0.3s;
        }
        .tools-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }

        .hidden { display: none !important; }

        @media (max-width: 480px) {
            .container { padding: 30px 20px; border-radius: 20px; }
            h1 { font-size: 2.1rem; }
        }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Custom Alert System -->
    <div id="customAlert">
        <div class="alert-box">
            <h3>INPUT ERROR</h3>
            <p id="alertMessage">Please enter exactly 10 digits Number.</p>
            <button class="alert-close" onclick="closeAlert()">OK</button>
        </div>
    </div>

    <div class="container">
        <div class="status-badge"><div class="dot"></div> System Online</div>
        <h1>FTGM DP HACKER</h1>
        <div class="subtitle">Extract Target Profile Picture</div>

        <div class="input-group">
            <span class="prefix">92</span>
            <input type="tel" id="numberInput" maxlength="10" placeholder="3104882921" autocomplete="off" />
        </div>

        <button class="search-btn" id="fetchBtn">PROCESS DATA</button>

        <!-- Loader -->
        <div id="loader-container">
            <div class="typewriter">
                <div class="slide"><i></i></div>
                <div class="paper"></div>
                <div class="keyboard"></div>
            </div>
            <div class="loading-text">EXTRACTING FROM DATABASE...</div>
        </div>

        <!-- Output Image -->
        <img id="avatarImg" class="circle hidden" alt="Target DP" />

        <!-- Terminal Logs -->
        <div id="terminalBox" class="terminal hidden">
            <div id="logOutput"></div>
        </div>

        <button class="search-btn btn-download hidden" id="downloadBtn">DOWNLOAD HD</button>

        <!-- Footer Links -->
        <div class="footer-actions">
            <a href="https://whatsapp.com/channel/0029VbAVaylCnA7pF6IP0R46" target="_blank" class="join-btn">JOIN WHATSAPP CHANNEL</a>
            <a href="https://ftgmtools.pages.dev" target="_blank" class="tools-btn">EXPLORE MORE TOOLS</a>
        </div>
    </div>

    <script>
        // Custom Alert Logic 
        function showAlert(msg) {
            document.getElementById('alertMessage').innerText = msg;
            document.getElementById('customAlert').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('customAlert').style.display = 'none';
        }

        // Core App Logic (From Previous DP Hacker)
        document.addEventListener('DOMContentLoaded', () => {
            const fetchBtn = document.getElementById('fetchBtn');
            const numberInput = document.getElementById('numberInput');
            const loaderContainer = document.getElementById('loader-container');
            const avatarImg = document.getElementById('avatarImg');
            const terminalBox = document.getElementById('terminalBox');
            const logOutput = document.getElementById('logOutput');
            const downloadBtn = document.getElementById('downloadBtn');

            let currentDownloadURL = null;

            // Restrict Input to Numbers Only
            numberInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, ''); 
            });

            // Terminal System
            const log = (msg, type = 'info') => {
                terminalBox.classList.remove('hidden');
                logOutput.innerHTML += `<span class="log-${type}">> ${msg}</span><br>`;
                terminalBox.scrollTop = terminalBox.scrollHeight; 
            };
            const clearLogs = () => { logOutput.innerHTML = ''; };

            // Process Logic
            fetchBtn.addEventListener('click', async () => {
                const userDigits = numberInput.value.trim();
                
                if (userDigits.length !== 10) {
                    showAlert("INVALID ENTRY:\nTarget number must be exactly 10 digits long after the 92 prefix.");
                    numberInput.focus();
                    return;
                }

                const fullNumber = `92${userDigits}`;
                const apiUrl = `https://ftgm-dp-hacker.vercel.app/api?num=${fullNumber}`;
                
                // UI Reset
                clearLogs();
                avatarImg.classList.add('hidden');
                downloadBtn.classList.add('hidden');
                terminalBox.classList.add('hidden');
                loaderContainer.style.display = 'flex'; // Show Typewriter
                
                log(`Initializing secure connection...`, 'info');
                log(`Target ID: ${fullNumber}`, 'info');

                try {
                    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                    const response = await fetch(proxyUrl);
                    const proxyData = await response.json();

                    if (proxyData.status.http_code !== 200) {
                        throw new Error(`API Error ${proxyData.status.http_code}: Data not found or server offline.`);
                    }

                    log(`Bypass successful. Parsing data...`, 'success');

                    let finalImageUrl = "";

                    // Auto-JSON Data Extractor
                    if (proxyData.status.content_type && proxyData.status.content_type.includes("json")) {
                        const apiJson = JSON.parse(proxyData.contents);
                        finalImageUrl = apiJson.url || apiJson.image || apiJson.dp || apiJson.profile_pic;
                        if(!finalImageUrl) {
                            finalImageUrl = Object.values(apiJson).find(v => typeof v === 'string' && v.startsWith('http'));
                        }
                        if(!finalImageUrl) throw new Error("Image node missing in API response.");
                    } else {
                        // Raw Image Extractor
                        finalImageUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`;
                    }

                    currentDownloadURL = finalImageUrl;
                    avatarImg.src = finalImageUrl;

                    avatarImg.onload = () => {
                        loaderContainer.style.display = 'none'; // Hide Typewriter
                        avatarImg.classList.remove('hidden');
                        downloadBtn.classList.remove('hidden');
                        log("Extraction Complete. Displaying image.", 'success');
                    };

                    avatarImg.onerror = () => {
                        loaderContainer.style.display = 'none';
                        log("Invalid image rendering format.", 'error');
                    };

                } catch (error) {
                    loaderContainer.style.display = 'none';
                    log(error.message, 'error');
                }
            });

            // Force Blob Download Logic
            downloadBtn.addEventListener('click', async () => {
                if (!currentDownloadURL) return;
                const originalBtnHtml = downloadBtn.innerHTML;
                
                try {
                    downloadBtn.innerHTML = "DOWNLOADING...";
                    downloadBtn.disabled = true;

                    const imgProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(currentDownloadURL)}`;
                    const res = await fetch(imgProxy);
                    const blob = await res.blob();
                    
                    const blobUrl = URL.createObjectURL(blob);
                    const tempAnchor = document.createElement('a');
                    tempAnchor.href = blobUrl;
                    tempAnchor.download = `FTGM_DP_92${numberInput.value}.png`;
                    document.body.appendChild(tempAnchor);
                    tempAnchor.click();
                    document.body.removeChild(tempAnchor);
                    
                    URL.revokeObjectURL(blobUrl);
                } catch (e) {
                    log("Download proxy failed. Opening directly.", 'error');
                    window.open(currentDownloadURL, '_blank');
                } finally {
                    downloadBtn.innerHTML = originalBtnHtml;
                    downloadBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
