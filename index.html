<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FTGM DP HACKER</title>

    <!-- Google Fonts for Modern Developer Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;800;900&display=swap" rel="stylesheet">

    <style>
        /* Modern Developer Theme */
        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --accent-green: #238636;
            --accent-green-hover: #2ea043;
            --error-red: #f85149;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .title {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 900;
            font-size: 2rem;
            color: var(--accent-blue);
            margin-top: 0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .btn {
            background-color: var(--accent-green);
            color: #ffffff;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .btn:hover:not(:disabled) {
            background-color: var(--accent-green-hover);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .display-area {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px auto;
        }

        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--border-color);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            display: block;
        }

        .shimmer {
            background: #21262d;
            background-image: linear-gradient(to right, #21262d 0%, #30363d 20%, #21262d 40%, #21262d 100%);
            background-repeat: no-repeat;
            background-size: 800px 100%;
            animation: placeholderShimmer 1.5s infinite linear forwards;
        }

        @keyframes placeholderShimmer {
            0% { background-position: -400px 0; }
            100% { background-position: 400px 0; }
        }

        .actions-box {
            background: var(--bg-body);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
        }

        .endpoint-url {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent-blue);
            word-break: break-all;
            margin-bottom: 16px;
            background: rgba(88, 166, 255, 0.1);
            padding: 8px;
            border-radius: 6px;
        }

        .download-btn {
            width: 100%;
            background-color: var(--accent-blue);
        }

        .download-btn:hover:not(:disabled) {
            background-color: #3182ce;
        }

        .error-text {
            color: var(--error-red);
            font-size: 0.85rem;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 480px) {
            .input-group { flex-direction: column; }
            .container { padding: 24px; border: none; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">FTGM DP HACKER</h1>
        <p class="subtitle">Extract Target Profile Picture Instantly</p>

        <div class="input-group">
            <input type="number" id="numberInput" placeholder="Enter Num: 923104882921" />
            <button class="btn" id="fetchBtn">Process</button>
        </div>

        <div class="display-area">
            <div id="loader" class="circle shimmer hidden"></div>
            <img id="avatarImg" class="circle hidden" alt="Target DP" />
        </div>

        <div id="errorMsg" class="error-text hidden"></div>

        <div id="actionBox" class="actions-box hidden">
            <div id="endpointText" class="endpoint-url"></div>
            <button class="btn download-btn" id="downloadBtn">Download Image</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fetchBtn = document.getElementById('fetchBtn');
            const numberInput = document.getElementById('numberInput');
            const loader = document.getElementById('loader');
            const avatarImg = document.getElementById('avatarImg');
            const actionBox = document.getElementById('actionBox');
            const endpointText = document.getElementById('endpointText');
            const downloadBtn = document.getElementById('downloadBtn');
            const errorMsg = document.getElementById('errorMsg');

            let currentApiUrl = "";

            fetchBtn.addEventListener('click', () => {
                const targetNum = numberInput.value.trim();

                if (!targetNum) {
                    showError("Please enter a valid number first.");
                    return;
                }

                currentApiUrl = `https://ftgm-dp-hacker.vercel.app/api?num=${targetNum}`;

                // Reset UI for new process
                loader.classList.remove('hidden');
                avatarImg.classList.add('hidden');
                actionBox.classList.add('hidden');
                errorMsg.classList.add('hidden');

                // Bypass CORS by assigning directly to the <img> tag
                // The browser will natively handle the fetch and any redirects.
                avatarImg.src = currentApiUrl;

                avatarImg.onload = () => {
                    loader.classList.add('hidden');
                    avatarImg.classList.remove('hidden');
                    endpointText.textContent = `API: ${currentApiUrl}`;
                    actionBox.classList.remove('hidden');
                };

                avatarImg.onerror = () => {
                    loader.classList.add('hidden');
                    showError("Failed to load DP. The API is offline or the number is invalid.");
                };
            });

            downloadBtn.addEventListener('click', async () => {
                const targetNum = numberInput.value.trim() || 'unknown';
                
                try {
                    downloadBtn.innerText = "Downloading...";
                    downloadBtn.disabled = true;

                    // Fetch through an open CORS proxy to force the physical download
                    const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(currentApiUrl)}`;
                    const response = await fetch(proxyUrl);
                    
                    if (!response.ok) throw new Error("Proxy failed");

                    const blob = await response.blob();
                    const blobUrl = URL.createObjectURL(blob);

                    const tempAnchor = document.createElement('a');
                    tempAnchor.href = blobUrl;
                    tempAnchor.download = `FTGM-DP-${targetNum}.png`;
                    document.body.appendChild(tempAnchor);
                    tempAnchor.click();
                    document.body.removeChild(tempAnchor);
                    
                    URL.revokeObjectURL(blobUrl);

                } catch (error) {
                    console.error("Download failed:", error);
                    // Fallback: If CORS proxy fails, simply open image in a new tab 
                    window.open(currentApiUrl, '_blank');
                } finally {
                    downloadBtn.innerText = "Download Image";
                    downloadBtn.disabled = false;
                }
            });

            function showError(msg) {
                errorMsg.textContent = msg;
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
