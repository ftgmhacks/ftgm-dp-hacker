<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile Friendly & Anti-Zoom on Inputs -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FTGM DP HACKER | CYBER NEXUS</title>
    
    <!-- FontAwesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 🌐 CYBER NEXUS THEME VARIABLES */
        :root {
            --bg-base: #02060f;
            --bg-card: rgba(6, 15, 28, 0.85);
            --nexus-cyan: #00f0ff;
            --nexus-cyan-dim: rgba(0, 240, 255, 0.2);
            --nexus-green: #00ff66;
            --nexus-green-dim: rgba(0, 255, 102, 0.2);
            --nexus-purple: #b026ff;
            --text-main: #e2f1ff;
            --text-muted: #8b9bb4;
            --warning: #ffb800;
            --error: #ff2a2a;
            --glow-cyan: 0 0 15px rgba(0, 240, 255, 0.4);
            --glow-green: 0 0 15px rgba(0, 255, 102, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Cyber Grid Background */
        .cyber-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--nexus-cyan-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--nexus-cyan-dim) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
            opacity: 0.3;
        }

        /* Ambient Glows */
        .ambient-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
        }
        .glow-1 { width: 400px; height: 400px; background: var(--nexus-cyan-dim); top: -100px; left: -100px; }
        .glow-2 { width: 400px; height: 400px; background: var(--nexus-green-dim); bottom: -100px; right: -100px; }

        /* Header */
        header {
            position: relative;
            z-index: 10;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--nexus-cyan-dim);
            background: rgba(2, 6, 15, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            color: var(--nexus-cyan);
            text-shadow: var(--glow-cyan);
            letter-spacing: 1px;
        }

        .logo i { font-size: 1.5rem; }

        .system-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--nexus-green);
            border: 1px solid var(--nexus-green);
            padding: 5px 12px;
            border-radius: 4px;
            background: var(--nexus-green-dim);
            text-shadow: var(--glow-green);
            box-shadow: inset 0 0 10px var(--nexus-green-dim);
        }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            z-index: 10;
            position: relative;
        }

        .nexus-card {
            background: var(--bg-card);
            border: 1px solid var(--nexus-cyan);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
            border-radius: 8px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 500px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative Corners */
        .nexus-card::before, .nexus-card::after {
            content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid var(--nexus-cyan); pointer-events: none;
        }
        .nexus-card::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .nexus-card::after { bottom: 0; right: 0; border-left: none; border-top: none; }

        .card-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .card-subtitle {
            color: var(--nexus-cyan);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        /* Input Area */
        .input-group { margin-bottom: 1.5rem; }
        
        .input-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hacker-input-wrapper {
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--nexus-cyan-dim);
            border-radius: 4px;
            padding: 5px;
            transition: all 0.3s;
        }

        .hacker-input-wrapper:focus-within {
            border-color: var(--nexus-cyan);
            box-shadow: var(--glow-cyan);
        }

        .prefix {
            color: var(--nexus-cyan);
            padding: 0 15px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        input[type="number"] {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px; /* 16px prevents iOS auto-zoom */
            padding: 12px 5px;
            outline: none;
        }

        input::placeholder { color: rgba(139, 155, 180, 0.4); }

        /* Cyber Warning */
        .cyber-warning {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(255, 184, 0, 0.1);
            border-left: 3px solid var(--warning);
            padding: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.75rem;
            color: #ddd;
            line-height: 1.4;
        }

        .cyber-warning i { color: var(--warning); margin-top: 2px; }

        /* Buttons */
        .cyber-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--nexus-cyan);
            color: var(--nexus-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            padding: 14px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .cyber-btn:hover:not(:disabled) {
            background: var(--nexus-cyan);
            color: #000;
            box-shadow: var(--glow-cyan);
        }

        .cyber-btn:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .download-btn {
            border-color: var(--nexus-green);
            color: var(--nexus-green);
            margin-top: 1.5rem;
        }

        .download-btn:hover:not(:disabled) {
            background: var(--nexus-green);
            color: #000;
            box-shadow: var(--glow-green);
        }

        /* Error Box */
        .error-box {
            display: none;
            margin-top: 1rem;
            padding: 12px;
            background: rgba(255, 42, 42, 0.1);
            border: 1px solid var(--error);
            color: var(--error);
            font-size: 0.8rem;
            text-align: center;
        }

        /* Image Display Area */
        .display-section {
            display: none;
            margin-top: 2rem;
            text-align: center;
            border-top: 1px dashed var(--nexus-cyan-dim);
            padding-top: 2rem;
        }

        .avatar-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto;
        }

        /* Tech frame around image */
        .tech-frame {
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid var(--nexus-cyan-dim);
            border-radius: 50%;
            animation: spin 10s linear infinite;
            border-top-color: var(--nexus-cyan);
            border-bottom-color: var(--nexus-cyan);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .avatar-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--nexus-cyan);
            position: relative;
            z-index: 2;
            background: #000;
        }

        /* Loading Overlay inside avatar */
        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            z-index: 3;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: var(--nexus-cyan);
            font-size: 0.7rem;
        }

        .loader-overlay.active { display: flex; }
        .loader-overlay i { font-size: 1.5rem; margin-bottom: 5px; animation: pulse 1s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.9); } }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            z-index: 10;
            border-top: 1px solid var(--nexus-cyan-dim);
            background: rgba(2, 6, 15, 0.9);
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .socials a {
            color: var(--nexus-cyan);
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid var(--nexus-cyan-dim);
            padding: 10px;
            border-radius: 4px;
            background: rgba(0, 240, 255, 0.05);
        }

        .socials a:hover {
            background: var(--nexus-cyan);
            color: #000;
            box-shadow: var(--glow-cyan);
        }

        .footer-text { font-size: 0.75rem; color: var(--text-muted); }

        @media (max-width: 480px) {
            .nexus-card { border: none; border-radius: 0; padding: 2rem 1.5rem; }
            header { padding: 1rem 1.5rem; }
            .logo { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <!-- Cyber Background Elements -->
    <div class="cyber-grid"></div>
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <header>
        <div class="logo">
            <i class="fa-solid fa-microchip"></i> FTGM HACKS
        </div>
        <div class="system-status">
            <i class="fa-solid fa-circle blink"></i> ONLINE
        </div>
    </header>

    <main>
        <div class="nexus-card">
            <h1 class="card-title">DP Extractor</h1>
            <p class="card-subtitle">PROTOCOL: OVERRIDE_TARGET_AVATAR</p>

            <div class="cyber-warning">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span><strong>RESTRICTION NOTICE:</strong> Tool executes successfully only on Business Profiles or numbers with Public/Everyone privacy settings.</span>
            </div>

            <div class="input-group">
                <label class="input-label">Target MSISDN (Phone Number)</label>
                <div class="hacker-input-wrapper">
                    <span class="prefix"><i class="fa-solid fa-plus"></i></span>
                    <!-- font-size: 16px in CSS strictly prevents mobile zoom -->
                    <input type="number" id="phoneNumber" placeholder="923001234567" autocomplete="off">
                </div>
            </div>

            <button class="cyber-btn" id="fetchBtn">
                <i class="fa-solid fa-terminal"></i> INITIATE EXTRACTION
            </button>

            <div class="error-box" id="errorBox">
                <i class="fa-solid fa-bug"></i> <span id="errorText">Extraction Failed. Target offline or restricted.</span>
            </div>

            <div class="display-section" id="displaySection">
                <div class="avatar-container">
                    <div class="tech-frame"></div>
                    <div class="loader-overlay" id="imgLoader">
                        <i class="fa-solid fa-radar fa-spin"></i>
                        <span>DECRYPTING...</span>
                    </div>
                    <!-- Blank transparent pixel initially -->
                    <img id="avatarImg" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Target DP">
                </div>

                <button class="cyber-btn download-btn" id="downloadBtn">
                    <i class="fa-solid fa-download"></i> AUTO DOWNLOAD
                </button>
            </div>
        </div>
    </main>

    <footer>
        <div class="socials">
            <a href="https://t.me/FTGMHACKS" target="_blank"><i class="fa-brands fa-telegram"></i></a>
            <a href="https://whatsapp.com/channel/0029VbAVaylCnA7pF6IP0R46" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="https://youtube.com/@ftgmtech" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="footer-text">© 2026 CYBER NEXUS • FTGM TECHNOLOGIES</div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const phoneInput = document.getElementById('phoneNumber');
            const fetchBtn = document.getElementById('fetchBtn');
            const displaySection = document.getElementById('displaySection');
            const imgLoader = document.getElementById('imgLoader');
            const avatarImg = document.getElementById('avatarImg');
            const downloadBtn = document.getElementById('downloadBtn');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');

            let currentTargetUrl = "";

            function showError(msg) {
                errorText.textContent = msg;
                errorBox.style.display = 'block';
                displaySection.style.display = 'none';
            }

            function hideError() {
                errorBox.style.display = 'none';
            }

            // EXTRACTION LOGIC
            fetchBtn.addEventListener('click', () => {
                const targetNum = phoneInput.value.trim();

                if (!targetNum || targetNum.length < 8) {
                    showError("ERR: Invalid MSISDN format.");
                    return;
                }

                hideError();
                currentTargetUrl = `https://ftgm-dp-hacker.vercel.app/api?num=${targetNum}`;

                // UI Reset
                displaySection.style.display = 'block';
                imgLoader.classList.add('active');
                fetchBtn.disabled = true;
                downloadBtn.style.display = 'none';

                // Preload Image to check validity
                const tempImg = new Image();
                tempImg.src = currentTargetUrl;

                tempImg.onload = () => {
                    avatarImg.src = currentTargetUrl;
                    setTimeout(() => {
                        imgLoader.classList.remove('active');
                        fetchBtn.disabled = false;
                        downloadBtn.style.display = 'flex';
                    }, 1000); // Hacky delay for effect
                };

                tempImg.onerror = () => {
                    displaySection.style.display = 'none';
                    imgLoader.classList.remove('active');
                    fetchBtn.disabled = false;
                    showError("ERR: Firewall active. Target DP is Private or Number Invalid.");
                };
            });

            // Trigger on Enter
            phoneInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') fetchBtn.click();
            });

            // ==========================================
            // BULLETPROOF AUTO-DOWNLOADER (BLOB METHOD)
            // ==========================================
            downloadBtn.addEventListener('click', async () => {
                const targetNum = phoneInput.value.trim() || 'TARGET';
                const originalText = downloadBtn.innerHTML;
                
                downloadBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> DOWNLOADING...';
                downloadBtn.disabled = true;

                const fileName = `NEXUS-DP-${targetNum}.png`;

                // Reusable trigger function
                const triggerSystemDownload = (blobUrl) => {
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = blobUrl;
                    a.download = fileName;
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(blobUrl);
                    }, 2000);
                };

                try {
                    // Method 1: Try Direct Fetch (if API has CORS allowed)
                    let response = await fetch(currentTargetUrl);
                    if (!response.ok) throw new Error("Direct fetch failed");
                    let blob = await response.blob();
                    triggerSystemDownload(window.URL.createObjectURL(blob));

                } catch (e1) {
                    console.log("Method 1 failed, trying proxy 1...");
                    try {
                        // Method 2: AllOrigins Proxy (Handles binary data well)
                        let proxyUrl1 = `https://api.allorigins.win/raw?url=${encodeURIComponent(currentTargetUrl)}`;
                        let response2 = await fetch(proxyUrl1);
                        if (!response2.ok) throw new Error("Proxy 1 failed");
                        let blob2 = await response2.blob();
                        triggerSystemDownload(window.URL.createObjectURL(blob2));

                    } catch (e2) {
                        console.log("Method 2 failed, trying proxy 2...");
                        try {
                            // Method 3: Weserv Image Proxy
                            let proxyUrl2 = `https://images.weserv.nl/?url=${encodeURIComponent(currentTargetUrl)}&output=png`;
                            let response3 = await fetch(proxyUrl2);
                            if (!response3.ok) throw new Error("Proxy 2 failed");
                            let blob3 = await response3.blob();
                            triggerSystemDownload(window.URL.createObjectURL(blob3));
                            
                        } catch (e3) {
                            console.error("All auto-download methods blocked by browser.");
                            // Failsafe Fallback: Open in new tab natively
                            window.open(currentTargetUrl, '_blank');
                        }
                    }
                } finally {
                    setTimeout(() => {
                        downloadBtn.innerHTML = originalText;
                        downloadBtn.disabled = false;
                    }, 1000);
                }
            });
        });
    </script>
</body>
</html>
